<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Newsletter</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f7;font-family:'Helvetica Neue',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f4f4f7;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- HEADER -->
          <tr>
            <td style="background:#4f46e5;padding:40px 48px;text-align:center;">
              <p style="margin:0 0 8px 0;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.7);">NEWSLETTER</p>
              <h1 style="margin:0;font-size:28px;font-weight:700;color:#ffffff;line-height:1.3;">{{headerTitle}}</h1>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="background:#ffffff;padding:40px 48px;">

              <!-- Intro -->
              <p style="margin:0 0 28px 0;font-size:16px;line-height:1.7;color:#374151;">{{intro}}</p>

              <!-- Main Story -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                <tr>
                  <td style="border-left:4px solid #4f46e5;padding:4px 0 4px 20px;">
                    <p style="margin:0 0 8px 0;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4f46e5;">{{mainStoryTitle}}</p>
                    <p style="margin:0;font-size:15px;line-height:1.7;color:#4b5563;">{{mainStoryContent}}</p>
                  </td>
                </tr>
              </table>

              <!-- Key Insights -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;background:#f8f7ff;border-radius:8px;">
                <tr>
                  <td style="padding:24px 28px;">
                    <p style="margin:0 0 14px 0;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4f46e5;">{{keyInsightsTitle}}</p>
                    <p style="margin:0;font-size:15px;line-height:1.9;color:#4b5563;white-space:pre-line;">{{keyInsightsContent}}</p>
                  </td>
                </tr>
              </table>

              <!-- Industry Update -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;background:#f0fdf4;border-radius:8px;">
                <tr>
                  <td style="padding:24px 28px;">
                    <p style="margin:0 0 14px 0;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;">{{industryUpdateTitle}}</p>
                    <p style="margin:0;font-size:15px;line-height:1.9;color:#4b5563;white-space:pre-line;">{{industryUpdateContent}}</p>
                  </td>
                </tr>
              </table>

              <!-- Pro Tip -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <p style="margin:0;font-size:15px;line-height:1.7;color:#92400e;">{{proTip}}</p>
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;">
                <tr>
                  <td align="center">
                    <a href="#" style="display:inline-block;background:#4f46e5;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 36px;border-radius:8px;">{{callToAction}}</a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#f9fafb;padding:24px 48px;text-align:center;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.6;">{{footerNote}}</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
